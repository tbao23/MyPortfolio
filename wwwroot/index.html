<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bao — Software Engineer</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="MyPortfolio.styles.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="pong-loader">
            <div class="pong-arena">
                <div class="pong-net"></div>
                <div class="pong-paddle pong-paddle--left"></div>
                <div class="pong-paddle pong-paddle--right"></div>
                <div class="pong-ball-wrap">
                    <div class="pong-ball"></div>
                </div>
            </div>
            <div class="pong-label">&gt; loading...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
